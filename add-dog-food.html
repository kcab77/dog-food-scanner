<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Dog Food to Database</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .ingredients-section {
            margin-bottom: 20px;
        }

        .ingredient-input {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .ingredient-input input {
            flex: 1;
        }

        .btn-remove {
            padding: 10px 12px;
            background-color: #ff6b6b;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.3s;
        }

        .btn-remove:hover {
            background-color: #ff5252;
        }

        .btn-add-ingredient {
            padding: 10px 12px;
            background-color: #51cf66;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.3s;
        }

        .btn-add-ingredient:hover {
            background-color: #40c057;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        .btn-submit {
            flex: 1;
            padding: 12px;
            background-color: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .btn-submit:hover {
            background-color: #5568d3;
        }

        .btn-reset {
            flex: 1;
            padding: 12px;
            background-color: #e9ecef;
            color: #333;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .btn-reset:hover {
            background-color: #dee2e6;
        }

        .message {
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            display: none;
        }

        .message.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .message.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .data-preview {
            background-color: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 4px;
            padding: 15px;
            margin-top: 20px;
            display: none;
        }

        .data-preview h3 {
            color: #333;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .data-preview pre {
            background-color: white;
            border: 1px solid #dee2e6;
            border-radius: 4px;
            padding: 10px;
            overflow-x: auto;
            font-size: 12px;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐕 Add Dog Food</h1>
        <p class="subtitle">Add a new dog food product to the database</p>

        <div id="message" class="message"></div>

        <form id="dogFoodForm">
            <div class="form-group">
                <label for="name">Product Name *</label>
                <input type="text" id="name" name="name" placeholder="e.g., Blue Buffalo Wilderness High Protein" required>
            </div>

            <div class="form-group">
                <label for="brand">Brand *</label>
                <input type="text" id="brand" name="brand" placeholder="e.g., Blue Buffalo" required>
            </div>

            <div class="form-group">
                <label for="barcode">Barcode *</label>
                <input type="text" id="barcode" name="barcode" placeholder="e.g., 074198532457" required>
            </div>

            <div class="ingredients-section">
                <label>Ingredients *</label>
                <div id="ingredientsList"></div>
                <button type="button" class="btn-add-ingredient" onclick="addIngredientField()">+ Add Ingredient</button>
            </div>

            <div class="button-group">
                <button type="submit" class="btn-submit">Add to Database</button>
                <button type="reset" class="btn-reset">Clear Form</button>
            </div>
        </form>

        <div id="dataPreview" class="data-preview">
            <h3>Preview of entry to be added:</h3>
            <pre id="previewContent"></pre>
        </div>
    </div>

    <script>
        let ingredientCount = 1;

        function addIngredientField() {
            const list = document.getElementById('ingredientsList');
            const div = document.createElement('div');
            div.className = 'ingredient-input';
            div.innerHTML = `
                <input type="text" name="ingredient" placeholder="e.g., Chicken" class="ingredient-input-field">
                <button type="button" class="btn-remove" onclick="this.parentElement.remove(); updatePreview()">Remove</button>
            `;
            list.appendChild(div);
            ingredientCount++;
            updatePreview();
        }

        function initializeIngredients() {
            addIngredientField();
            addIngredientField();
        }

        function updatePreview() {
            const name = document.getElementById('name').value;
            const brand = document.getElementById('brand').value;
            const barcode = document.getElementById('barcode').value;
            const ingredientInputs = document.querySelectorAll('.ingredient-input-field');
            const ingredients = Array.from(ingredientInputs).map(input => input.value).filter(val => val.trim());

            if (name || brand || barcode || ingredients.length > 0) {
                const preview = {
                    id: "[AUTO-GENERATED]",
                    barcode: barcode || "[REQUIRED]",
                    name: name || "[REQUIRED]",
                    brand: brand || "[REQUIRED]",
                    ingredients: ingredients.length > 0 ? ingredients : ["[ADD AT LEAST ONE]"]
                };
                document.getElementById('previewContent').textContent = JSON.stringify(preview, null, 2);
                document.getElementById('dataPreview').style.display = 'block';
            } else {
                document.getElementById('dataPreview').style.display = 'none';
            }
        }

        document.getElementById('dogFoodForm').addEventListener('change', updatePreview);
        document.getElementById('dogFoodForm').addEventListener('input', updatePreview);

        document.getElementById('dogFoodForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const name = document.getElementById('name').value.trim();
            const brand = document.getElementById('brand').value.trim();
            const barcode = document.getElementById('barcode').value.trim();
            const ingredientInputs = document.querySelectorAll('.ingredient-input-field');
            const ingredients = Array.from(ingredientInputs).map(input => input.value.trim()).filter(val => val);

            // Validation
            if (!name || !brand || !barcode || ingredients.length === 0) {
                showMessage('Please fill in all required fields and add at least one ingredient.', 'error');
                return;
            }

            const messageEl = document.getElementById('message');
            messageEl.textContent = 'Adding to database...';
            messageEl.className = 'message success';
            messageEl.style.display = 'block';

            try {
                // Fetch the current database
                const response = await fetch('dog-food-database.json');
                const data = await response.json();

                // Generate new ID
                const newId = Math.max(...data.dogFoods.map(f => f.id), 0) + 1;

                // Create new entry
                const newEntry = {
                    id: newId,
                    barcode: barcode,
                    name: name,
                    brand: brand,
                    ingredients: ingredients
                };

                // Add to database
                data.dogFoods.push(newEntry);

                // Send to server (you'll need to set up a backend for this)
                // For now, we'll just show success and log the data
                showMessage(`✓ Successfully added "${name}" to the database! New Entry ID: ${newId}`, 'success');
                
                // Log the JSON that would be sent
                console.log('New database content:', JSON.stringify(data, null, 2));
                
                // Clear form
                document.getElementById('dogFoodForm').reset();
                ingredientCount = 1;
                document.getElementById('ingredientsList').innerHTML = '';
                initializeIngredients();
                updatePreview();

            } catch (error) {
                showMessage(`Error: ${error.message}. You'll need to set up a backend to save data.`, 'error');
                console.log('Entry that would be added:', {
                    name, brand, barcode, ingredients
                });
            }
        });

        function showMessage(text, type) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = text;
            messageEl.className = `message ${type}`;
            messageEl.style.display = 'block';
        }

        // Initialize form
        initializeIngredients();
    </script>
</body>
</html>
